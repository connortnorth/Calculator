<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desmos-Lite Graphing Engine</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">Desmos-Lite</div>

    <div class="ai-prompt-section">
        <div class="ai-input-wrapper">
            <input type="text" id="ai-prompt" class="ai-input" placeholder="Ask AI: 'Draw a circle'">
            <button class="ai-btn" onclick="generateAiShape()">Generate</button>
        </div>
        <div style="font-size: 0.8rem; color: #7f8c8d;">
            Try: "Draw a heart", "Draw a star", "Draw a spiral"
        </div>
    </div>

    <div class="equation-list" id="eq-list"></div>
    <div class="add-btn" onclick="addEquation()">+ Add Expression</div>
</div>

<div class="graph-container" id="graph-container">
    <canvas id="graph"></canvas>
    <div class="instructions">Scroll to Zoom • Click & Drag to Pan</div>
</div>

<script src="Script.js"></script>
</body>
</html>
