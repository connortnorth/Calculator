<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desmos-Lite x Puter.js AI</title>
    <script src="https://js.puter.com/v2/"></script>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">Desmos-Lite x Puter.js AI</div>

    <div class="ai-prompt-section">
        <div class="ai-input-wrapper">
            <input type="text" id="ai-prompt" class="ai-input" placeholder="Ask AI: 'Draw a parabolic arch'">
            <button id="generate-btn" class="ai-btn" onclick="generateAiShape()">Generate</button>
        </div>
        <div id="ai-status" style="font-size: 0.8rem; color: #7f8c8d;">
            Powered by Puter.js (Supports x=, y=, and pure math evaluations)
        </div>
    </div>

    <div class="equation-list" id="eq-list"></div>
    <div class="add-btn" onclick="addEquation()">+ Add Expression</div>
</div>

<div class="graph-container" id="graph-container">
    <canvas id="graph"></canvas>
    <div class="instructions">Scroll to Zoom • Click & Drag to Pan</div>
</div>

<script src="Script.js"></script>
</body>
</html>
