<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Desmos-Lite Graphing Calculator</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

<button class="mobile-toggle" onclick="toggleSidebar()">☰ Menu</button>
<button class="dark-toggle" onclick="toggleDarkMode()">🌓 Mode</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div id="desmos-wrapper">
    <button class="back-to-lite-btn" onclick="closeActualDesmos()">← Back to Lite Engine</button>
    <div id="actual-desmos-engine"></div>
</div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        Desmos-Lite
        <button class="close-sidebar" onclick="toggleSidebar()">✕</button>
    </div>

    <div class="import-hub">
        <h4>Generate with Gemini</h4>
        <div>1. Type what you want to draw:</div>
        <input type="text" id="user-idea" class="idea-input" placeholder="e.g., a detailed mechanical dragon" />

        <button class="action-btn btn-copy" onclick="openGeminiWithPrompt()">🚀 Open Gemini & Prompt</button>

        <div style="margin-top: 5px;">2. Paste AI response directly:</div>
        <button class="action-btn btn-load" onclick="readClipboardAndLoad()">📥 Paste & Load from Clipboard</button>
    </div>

    <div class="equation-list" id="eq-list"></div>
    <div class="add-btn" onclick="addEquation()">+ Add Expression</div>
    <div class="export-btn" onclick="exportToDesmos()">↗ Open in Actual Desmos</div>
</div>

<div class="graph-container" id="graph-container">
    <canvas id="graph"></canvas>
    <div class="instructions">Scroll/Pinch to Zoom • Drag to Pan</div>
</div>

<script src="Script.js"></script>
</body>
</html>
